<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劉俊興 作品集</title>
    <link rel="stylesheet" href="../css/carousel.css">
</head>
<body>

<header>
    <a href="../index.html">
        <img src="../img/my_logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/68x63?text=Logo'">
    </a>
</header>

<main>
    <div class="carousel-wrapper">
        <div class="crop-layer">
            <div class="container" id="carouselContainer">
                <div class="item">
                    <div class="loader">
                        <div class="loader-bracket"></div>
                        <div class="loader-heart"></div>
                        <div class="loader-text">Loading...</div>
                    </div>
                    <img src="../img/poster_design/chess_challenge.webp" alt="1">
                </div>
                <div class="item">
                    <div class="loader">
                        <div class="loader-bracket"></div>
                        <div class="loader-heart"></div>
                        <div class="loader-text">Loading...</div>
                    </div>
                    <img src="../img/poster_design/chess_club_recruitment.webp" alt="2">
                </div>
                <div class="item">
                    <div class="loader">
                        <div class="loader-bracket"></div>
                        <div class="loader-heart"></div>
                        <div class="loader-text">Loading...</div>
                    </div>
                    <img src="../img/poster_design/christmas_market.webp" alt="3">
                </div>
                <div class="item">
                    <div class="loader">
                        <div class="loader-bracket"></div>
                        <div class="loader-heart"></div>
                        <div class="loader-text">Loading...</div>
                    </div>
                    <img src="../img/poster_design/game_taste.webp" alt="4">
                </div>
                <div class="item">
                    <div class="loader">
                        <div class="loader-bracket"></div>
                        <div class="loader-heart"></div>
                        <div class="loader-text">Loading...</div>
                    </div>
                    <img src="../img/poster_design/magic_war.webp" alt="5">
                </div>
                <div class="item">
                    <div class="loader">
                        <div class="loader-bracket"></div>
                        <div class="loader-heart"></div>
                        <div class="loader-text">Loading...</div>
                    </div>
                    <img src="../img/poster_design/mahjong_competition.webp" alt="6">
                </div>
            </div>
        </div>

        <button class="btn prev" id="prevBtn">&lt;</button>
        <button class="btn next" id="nextBtn">&gt;</button>
    </div>
</main>

<img class="bottom-building" src="../img/building1920X200.png" alt="Decor">

<footer></footer>

<div class="preview-modal" id="previewModal">
    <span class="close-preview" id="closePreview">&times;</span>
    <img class="preview-content" id="previewImg" src="" alt="預覽圖">
</div>

<script src="../script/corousel.js"></script>

</body>
</html>
